<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00d2ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="3"/>
  <!-- Network nodes and connections -->
  <!-- Central node -->
  <circle cx="200" cy="200" r="32" fill="url(#accentGrad)" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="28" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <!-- Orbiting nodes -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="108" r="14" fill="url(#accentGrad2)"/>
    <circle cx="280" cy="155" r="12" fill="url(#accentGrad)"/>
    <circle cx="280" cy="245" r="13" fill="url(#accentGrad2)"/>
    <circle cx="200" cy="292" r="11" fill="url(#accentGrad)"/>
    <circle cx="120" cy="245" r="12" fill="url(#accentGrad2)"/>
    <circle cx="120" cy="155" r="13" fill="url(#accentGrad)"/>
  </g>
  <!-- Connections (lines between nodes) -->
  <g stroke="#00d2ff" stroke-width="1.2" opacity="0.5" fill="none">
    <line x1="200" y1="200" x2="200" y2="108"/>
    <line x1="200" y1="200" x2="280" y2="155"/>
    <line x1="200" y1="200" x2="280" y2="245"/>
    <line x1="200" y1="200" x2="200" y2="292"/>
    <line x1="200" y1="200" x2="120" y2="245"/>
    <line x1="200" y1="200" x2="120" y2="155"/>
    <!-- Inter-node connections -->
    <line x1="200" y1="108" x2="280" y2="155" opacity="0.3"/>
    <line x1="280" y1="155" x2="280" y2="245" opacity="0.3"/>
    <line x1="280" y1="245" x2="200" y2="292" opacity="0.3"/>
    <line x1="200" y1="292" x2="120" y2="245" opacity="0.3"/>
    <line x1="120" y1="245" x2="120" y2="155" opacity="0.3"/>
    <line x1="120" y1="155" x2="200" y2="108" opacity="0.3"/>
  </g>
  <!-- Small data dots on connections -->
  <circle cx="200" cy="140" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="250" cy="168" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="250" cy="232" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="200" cy="260" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="150" cy="232" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="150" cy="168" r="2.5" fill="#fff" opacity="0.8"/>
  <!-- C and N letters in center -->
  <text x="200" y="210" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-weight="bold" font-size="28" letter-spacing="-1">CN</text>
</svg>
